services:
  quiz-api:
    build: .
    container_name: quiz-api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
    volumes:
      - .:/app
      - ./storage:/app/storage
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
